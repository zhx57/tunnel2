name: Upstream Sync

permissions:
  contents: write
  # 不需要 workflows: write，因为我们不让 workflow 文件被修改

on:
  schedule:
    - cron: "0 0 * * *"     # 每天 UTC 0点 执行
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/cmliu/edgetunnel.git || true

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Merge upstream but protect sync.yml
        run: |
          echo "=== 开始从 upstream 同步 ==="

          # 执行合并，优先采用 upstream 的版本（对其他文件）
          if git merge upstream/main --allow-unrelated-histories -X theirs -m "Sync from upstream $(date +%Y-%m-%d)"; then
            echo "✅ Merge completed (using theirs for most files)"
          else
            echo "⚠️  Merge had conflicts, resolving automatically..."
            # 如果有冲突，强制解决为 theirs（上游版本）
            git checkout --theirs -- .
            git add .
          fi

          # 关键保护步骤：强制恢复你本地的 sync.yml（不被上游覆盖）
          echo "🔒 正在保护 sync.yml（保留本地版本）..."
          git checkout --ours -- .github/workflows/sync.yml
          git add .github/workflows/sync.yml

          # 检查是否真的有变更需要提交
          if git diff --cached --quiet; then
            echo "✅ 没有需要提交的变更（上游与本地一致）"
          else
            git commit -m "Sync from upstream $(date +%Y-%m-%d) (protected sync.yml)"
            echo "✅ 已提交同步变更（sync.yml 已保护）"
          fi

      - name: Push to origin
        run: |
          echo "=== 正在推送 ==="
          if git push origin main --force-with-lease; then
            echo "✅ Successfully pushed to origin/main"
          else
            echo "❌ Push failed"
            exit 1
          fi
