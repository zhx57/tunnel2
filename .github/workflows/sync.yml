name: Upstream Sync

permissions:
  contents: write     # 只保留这个就够了

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.UPSTREAM_PAT }}   # 使用 PAT checkout

      - name: Configure git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/cmliu/edgetunnel.git || true

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Merge upstream but protect sync.yml
        run: |
          echo "=== 开始从 upstream 同步 ==="

          if git merge upstream/main --allow-unrelated-histories -X theirs -m "Sync from upstream $(date +%Y-%m-%d)"; then
            echo "✅ Merge completed"
          else
            echo "⚠️ Merge had conflicts, resolving..."
            git checkout --theirs -- .
            git add .
          fi

          # 强制保护自己的 sync.yml
          echo "🔒 正在保护 sync.yml（保留本地版本）..."
          git checkout --ours -- .github/workflows/sync.yml
          git add .github/workflows/sync.yml

          if git diff --cached --quiet; then
            echo "✅ 没有需要提交的变更"
          else
            git commit -m "Sync from upstream $(date +%Y-%m-%d) (protected sync.yml)"
            echo "✅ 已提交变更"
          fi

      - name: Push to origin
        run: |
          echo "=== 正在推送 ==="
          if git push origin main --force-with-lease; then
            echo "✅ Successfully pushed to origin/main"
          else
            echo "❌ Push failed"
            exit 1
          fi
