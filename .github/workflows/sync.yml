name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"  # 每天执行
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/cmliu/edgetunnel.git || true

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Merge upstream with unrelated histories
        run: |
          git merge upstream/main --allow-unrelated-histories -m "Sync from upstream" || echo "Merge completed"

      - name: Push to origin
        run: git push origin main --force-with-lease || echo "Push completed"
