name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with PAT
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.UPSTREAM_PAT }}
          persist-credentials: false

      - name: Configure git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git config --local credential.helper "!f() { echo username=zhx57; echo password=${{ secrets.UPSTREAM_PAT }}; }; f"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/cmliu/edgetunnel.git || true

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Merge upstream but STRONGLY protect sync.yml
        run: |
          echo "=== 开始从 upstream 同步 ==="

          # 先备份自己的 sync.yml
          cp .github/workflows/sync.yml /tmp/my_sync.yml

          # 执行合并（其他文件优先用 upstream）
          git merge upstream/main --allow-unrelated-histories -X theirs -m "Sync from upstream $(date +%Y-%m-%d)" || true

          # 强制恢复自己的 sync.yml（最强保护）
          echo "🔒 强制恢复 sync.yml 为本地版本..."
          cp /tmp/my_sync.yml .github/workflows/sync.yml
          git add .github/workflows/sync.yml

          # 如果有其他变更，一起提交
          if ! git diff --cached --quiet; then
            git commit -m "Sync from upstream $(date +%Y-%m-%d) [protected sync.yml]"
            echo "✅ 已提交同步（sync.yml 已保护）"
          else
            echo "✅ 上游与本地一致，无需提交"
          fi

      - name: Push to origin
        run: |
          echo "=== 正在推送 ==="
          git push origin main --force-with-lease || echo "❌ Push failed"
